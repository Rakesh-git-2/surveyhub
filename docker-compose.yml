services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-surveyhub}
      POSTGRES_USER: ${DB_USER:-surveyhubuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-surveyhubuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./surveyhubbackend
    restart: unless-stopped
    env_file: ./surveyhubbackend/.env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python -m gunicorn surveyhubbackend.wsgi:application
               --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build:
      context: ./surveyhub-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
